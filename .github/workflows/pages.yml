name: Deploy to GitHub Pages

# Publishes the repo root as a static site on GitHub Pages.
# The app is a zero-build vanilla PWA — nothing to compile, just upload.
# Reminder: bump CACHE_VERSION in sw.js before pushing, otherwise installed
# clients keep serving the previous version from their service worker cache.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys so a fast second push can't overtake an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo — there is no build step. manifest.json,
          # index.html, sw.js, and every module are served verbatim.
          # Docs/config files (AGENTS.md, decisions/, change-logs/, scripts/)
          # are already public in the repo, so shipping them is harmless.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
