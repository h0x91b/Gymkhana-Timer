<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f4ed" />
  <title data-i18n-key="app.title">Gymkhana Timer</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="stage">
    <div id="viewport">
      <video id="cam" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
    </div>
    <canvas id="roi-view" hidden></canvas>

    <!-- Aim reticle: fixed green square at screen center. During aim mode
         (body[data-aiming="true"]) this is the WYSIWYG ROI preview — whatever
         lives inside the square at the moment the rider taps Confirm becomes
         the detector's ROI. pointer-events:none so it never fights the pinch
         gesture that moves the video underneath. See decisions/010. -->
    <div id="reticle" class="reticle" aria-hidden="true"></div>
    <div id="gesture-hint" class="gesture-hint" hidden data-i18n-key="ui.gestureHint">Pinch to place the gate inside the square · Two-finger drag to pan · Tap Confirm ROI when ready</div>

    <div id="hud">
      <div id="timer" class="timer">0.000</div>
      <!-- Secondary sub-line under the big timer. Renders (depending on phase):
             ARMED    → "Ready to go"
             RUNNING  → "Previous: 42.35s"
             OBSERVING→ "Waiting for clear frame…" (or error variant past 20s)
           During COOLDOWN it's hidden — the cooldown pill below (draining
           progress bar + countdown) is the canonical indicator. -->
      <div id="timer-subline" class="timer-subline" hidden></div>
      <!-- Cooldown pill: repurposed for the session COOLDOWN countdown,
           NOT the detector's post-trigger debounce. The progress bar drains
           visually so the rider can gauge remaining wait without reading
           the number. Hidden outside COOLDOWN. -->
      <div id="cooldown" class="cooldown" hidden>
        <div id="cooldown-text" class="cooldown-text"></div>
        <div class="cooldown-bar"><div id="cooldown-fill" class="cooldown-fill"></div></div>
      </div>
      <!-- Last 5 runs from localStorage. Fills the empty space below the
           timer so the rider can read recent results at a glance without
           opening a history screen. Hidden until there's at least one run. -->
      <div id="run-history" class="run-history" hidden></div>
      <!-- Debug row: FPS + status + detector internals on one line. Hidden
           unless the Debug toggle is on. Replaces the earlier stack of
           separate pills and removes the vestigial version-badge `—` blob. -->
      <div id="debug-row" class="debug-row">
        <div id="status" class="status" data-status="IDLE" data-i18n-key="status.idle">IDLE</div>
        <div id="fps-readout" class="fps-readout" hidden>— FPS · ±— ms</div>
        <div id="debug" class="debug"></div>
      </div>
    </div>

    <div id="controls" class="controls">
      <button id="btn-start-camera" type="button" data-i18n-key="ui.startCamera">Start camera</button>
      <button id="btn-set-roi" type="button" disabled data-i18n-key="ui.confirmRoi">Confirm ROI</button>
      <!-- Single lifecycle button: "Start session" when idle, "Stop session"
           while the hands-free loop is running. See app.js refreshSessionButton(). -->
      <button id="btn-session" type="button" class="primary" disabled data-i18n-key="ui.startSession">Start session</button>
      <button id="btn-update" type="button" class="update" hidden data-i18n-key="ui.update">Update</button>
      <label class="threshold">
        <span data-i18n-key="ui.threshold">Threshold</span>
        <input id="threshold" type="range" min="0.01" max="0.5" step="0.01" value="0.25" />
      </label>
      <label class="debug-toggle">
        <input id="debug-toggle" type="checkbox" checked />
        <span data-i18n-key="ui.debug">Debug</span>
      </label>
      <label class="lang-select">
        <span data-i18n-key="ui.language">Language</span>
        <select id="lang-select"></select>
      </label>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
